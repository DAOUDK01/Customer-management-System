services:
  - type: web
    name: restaurant-management-system
    env: node
    plan: free
    buildCommand: npm install && npm install --workspace client && npm install --workspace server && npm run build --workspace client
    startCommand: npm start --workspace server
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Admin
